services:
  db:
    image: postgres:16-alpine
    container_name: reconmesh-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Database is intentionally NOT exposed to the host network
    # Only the backend container can reach it via Docker's internal network
    networks:
      - reconmesh-net

  redis:
    image: redis:7-alpine
    container_name: reconmesh-redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Redis also stays internal — never exposed to the host
    networks:
      - reconmesh-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: reconmesh-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      BACKEND_SECRET_KEY: ${BACKEND_SECRET_KEY}
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      # Only the backend's HTTP port is exposed to your laptop
      # 127.0.0.1 means: only localhost can reach it, NOT other machines on your network
      - "127.0.0.1:${BACKEND_PORT}:8000"
    volumes:
      # Mount the backend source code into the container
      # This means code changes show up live without rebuilding the container
      - ./backend:/app
    networks:
      - reconmesh-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: reconmesh-frontend
    restart: unless-stopped
    networks:
      - reconmesh-net
    ports:
      # Bind frontend dev server to localhost only — same as backend
      - "127.0.0.1:5173:5173"
    volumes:
      # Mount the source so file changes hot-reload
      - ./frontend:/app
      # IMPORTANT: this anonymous volume "shadows" the host's node_modules
      # so the container's installed deps aren't overwritten by your laptop's
      - /app/node_modules
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5173/', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

networks:
  reconmesh-net:
    driver: bridge

volumes:
  db_data:
    driver: local